# ==============================================================
# Smart Document Q&A - Streamlit Configuration (v3.0.5 - ASCII Safe)
# ==============================================================
# Streamlit Cloud optimized - minimal settings to prevent crashes.
# Doc: https://docs.streamlit.io/library/advanced-features/configuration
# ==============================================================

[server]
port = 8501
maxUploadSize = 500
headless = true
enableCORS = false
enableXsrfProtection = false
runOnSave = false

[theme]
base = "dark"
primaryColor = "#3B82F6"
backgroundColor = "#0B0F19"
secondaryBackgroundColor = "#111827"
textColor = "#F1F5F9"
font = "sans serif"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "viewer"
showErrorDetails = true
